name: Build and test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Run tests on Windows
        if: runner.os == 'Windows'
        run: sbt clean test

      - name: Run tests on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a sbt ";clean;test"

      - name: Build fat JAR
        run: sbt assembly

      - name: Locate JAR
        shell: bash
        run: |
          mkdir -p artifacts
          find target -name "todo-list-testfx-*-1.0.jar" \
            -exec cp {} artifacts/ \;

      - name: Upload JAR
        uses: actions/upload-artifact@v6
        with:
          name: todo-list-testfx-${{ runner.os }}
          path: artifacts/*.jar
          if-no-files-found: error